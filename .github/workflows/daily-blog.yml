name: Daily Blog Post

on:
  schedule:
    # Run daily at 11:30 PM IST (6:00 PM UTC)
    - cron: '0 18 * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git log analysis

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate daily blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "You are the daily-blogger agent. Generate today's blog post based on my GitHub activity in the last 24 hours. Follow the instructions in .claude/agents/daily-blogger.md. Create the blog post file, update the index, and commit the changes." --allowedTools Read,Write,Edit,Bash,Glob,Grep

      - name: Push changes if any
        run: |
          git config user.name "Daily Blog Bot"
          git config user.email "blog-bot@users.noreply.github.com"
          git diff --quiet && git diff --staged --quiet && echo "No changes to push" || git push
