name: Daily Blog Post

on:
  schedule:
    # Run daily at 11:30 PM IST (6:00 PM UTC)
    - cron: '0 18 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for git log analysis

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Git config MUST be set before Claude runs (it commits)
      - name: Configure git
        run: |
          git config user.name "Daily Blog Bot"
          git config user.email "blog-bot@users.noreply.github.com"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate daily blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          claude -p "You are the daily-blogger agent for Saurabh Jalendra's portfolio.

          Your task:
          1. Check GitHub activity for SaurabhJalendra in the last 24 hours using 'gh api users/SaurabhJalendra/events' and 'git log --since=24.hours.ago'
          2. If there is meaningful activity, write a blog post about it
          3. Create the blog post as a markdown file at src/data/blog/$(date +%Y-%m-%d)-<slug>.md with frontmatter (title, date, tags, summary, readTime)
          4. Update src/data/blog/index.ts to add the new post metadata to the blogPosts array
          5. Commit with message 'blog: $(date +%Y-%m-%d) - <title>'
          6. If there is no meaningful activity today, do nothing - just say 'No activity to blog about'

          Read .claude/agents/daily-blogger.md for detailed writing style and quality guidelines.

          IMPORTANT: The blog index at src/data/blog/index.ts exports a blogPosts array. Add the new post's metadata (slug, title, date, tags, summary, readTime) to this array. Do NOT include the content field - only metadata." \
          --allowedTools "Read,Write,Edit,Bash(git *),Bash(gh *),Bash(date *),Glob,Grep" \
          --model claude-sonnet-4-6

      - name: Push changes if any
        run: |
          git diff --quiet && git diff --staged --quiet && echo "No changes to push" || git push
