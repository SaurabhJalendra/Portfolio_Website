name: Generate Blog Post (Manual)

on:
  workflow_dispatch:
    inputs:
      topic:
        description: 'Optional topic to write about (leave empty for auto-detect from GitHub activity)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure git
        run: |
          git config user.name "Daily Blog Bot"
          git config user.email "blog-bot@users.noreply.github.com"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TOPIC="${{ github.event.inputs.topic }}"
          if [ -z "$TOPIC" ]; then
            PROMPT_TOPIC="based on SaurabhJalendra's GitHub activity in the last 7 days"
          else
            PROMPT_TOPIC="about the following topic: $TOPIC"
          fi

          claude -p "You are the daily-blogger agent for Saurabh Jalendra's portfolio.

          Write a blog post ${PROMPT_TOPIC}.

          Steps:
          1. If no topic given, check GitHub activity: 'gh api users/SaurabhJalendra/events --jq .[].type | head -20' and 'git log --since=7.days.ago --oneline'
          2. Create markdown file at src/data/blog/$(date +%Y-%m-%d)-<slug>.md with frontmatter
          3. Update src/data/blog/index.ts - add new post metadata to blogPosts array
          4. Commit with 'blog: $(date +%Y-%m-%d) - <title>'

          Read .claude/agents/daily-blogger.md for writing style.
          Only add metadata (slug, title, date, tags, summary, readTime) to index.ts, NOT content." \
          --allowedTools "Read,Write,Edit,Bash(git *),Bash(gh *),Bash(date *),Glob,Grep" \
          --model claude-sonnet-4-6

      - name: Push changes if any
        run: |
          git diff --quiet && git diff --staged --quiet && echo "No changes to push" || git push
